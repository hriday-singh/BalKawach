version: '3.8'

services:
  transcription:
    build:
      context: .
      dockerfile: Dockerfile.transcription
    ports:
      - "9121:9121"
    volumes:
      - uploads:/app/uploads
      - db-data:/app/data
      - hf_cache:/root/.cache/huggingface
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_PATH=/app/data/cpms.db
    restart: unless-stopped
    tty: true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9121/api/languages')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "9123:9123"
    volumes:
      - uploads:/app/uploads
      - db-data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - TRANSCRIPTION_SERVER_URL=http://transcription:9121
      - DATABASE_PATH=/app/data/cpms.db
    depends_on:
      transcription:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9123/api/system/network-info')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "9122:9122"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  uploads:
  db-data:
  hf_cache:
